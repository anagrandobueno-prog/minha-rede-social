<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flow — Minimal Lux</title>
  <style>
    /* ===== RESET & VARIÁVEIS (PRETO & DOURADO - SEM IMAGENS) ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:   #d4af37; /* Gold */
      --primary-d: #b8860b; /* Dark Gold */
      --bg:        #0a0a0a; /* Rich Black */
      --card:      #1a1a1a; /* Dark Grey/Black */
      --text:      #e0e0e0; /* Light Grey */
      --muted:     #8a8a8a; /* Muted Grey */
      --border:    #333333; /* Dark Border */
      --radius:    12px;
      --shadow:    0 4px 20px rgba(0,0,0,.5);
      --transition: .25s ease;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    button { cursor: pointer; border: none; outline: none; font-family: inherit; }
    input, textarea { font-family: inherit; outline: none; border: none; color: var(--text); background: #222; }

    /* ===== AVATAR PLACEHOLDER (SUBSTITUI <img>) ===== */
    .avatar-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #222, #000);
      color: var(--primary);
      font-weight: 800;
      border: 2px solid var(--primary);
      border-radius: 50%;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .avatar-sm { width: 38px; height: 38px; font-size: .9rem; }
    .avatar-md { width: 56px; height: 56px; font-size: 1.2rem; }
    .avatar-lg { width: 80px; height: 80px; font-size: 1.8rem; }

    /* ===== TELA DE LOGIN ===== */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
    }

    .login-box {
      background: var(--card);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 0 40px rgba(212, 175, 55, 0.15);
      text-align: center;
      border: 1px solid var(--border);
    }

    .login-box .logo {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    .login-box .tagline {
      color: var(--muted);
      font-size: .9rem;
      margin-bottom: 32px;
    }

    .login-box input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: .95rem;
      margin-bottom: 14px;
      background: #0f0f0f;
    }

    .login-box input:focus { border-color: var(--primary); }

    .btn-primary {
      width: 100%;
      padding: 13px;
      background: var(--primary);
      color: #000;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 700;
      transition: background var(--transition);
    }

    .btn-primary:hover { background: var(--primary-d); }

    .switch-link { margin-top: 18px; font-size: .88rem; color: var(--muted); }
    .switch-link span { color: var(--primary); font-weight: 600; cursor: pointer; }

    /* ===== NAVBAR ===== */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #000;
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .navbar .brand { font-size: 1.5rem; font-weight: 800; color: var(--primary); }

    .nav-icons { display: flex; gap: 12px; align-items: center; }

    .nav-icon-btn {
      position: relative;
      width: 40px; height: 40px;
      border-radius: 50%;
      background: #1a1a1a;
      display: flex; align-items: center; justify-content: center;
      color: var(--primary);
      border: 1px solid var(--border);
    }

    .badge {
      position: absolute;
      top: -2px; right: -2px;
      background: var(--primary);
      color: #000;
      font-size: .65rem;
      font-weight: 800;
      border-radius: 50%;
      width: 18px; height: 18px;
      display: flex; align-items: center; justify-content: center;
      border: 2px solid #000;
    }

    /* ===== LAYOUT ===== */
    .main-layout {
      max-width: 1100px;
      margin: 24px auto;
      padding: 0 16px;
      display: grid;
      grid-template-columns: 260px 1fr 280px;
      gap: 20px;
    }

    @media (max-width: 900px) {
      .main-layout { grid-template-columns: 1fr; }
      .sidebar-left, .sidebar-right { display: none; }
    }

    .sidebar-left, .sidebar-right { display: flex; flex-direction: column; gap: 12px; }

    /* CARDS */
    .widget, .profile-card, .menu-card, .create-post, .post-card, .stories-bar {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .profile-card .cover { height: 70px; background: linear-gradient(135deg, #000, var(--primary-d)); }
    .profile-card .info { padding: 0 16px 16px; text-align: center; }
    .profile-card .avatar-wrap { margin-top: -28px; margin-bottom: 8px; display: flex; justify-content: center; }
    .profile-card .name { font-weight: 700; color: #fff; }
    .profile-card .handle { color: var(--primary); font-size: .82rem; }

    .profile-stats { display: flex; justify-content: space-around; border-top: 1px solid var(--border); padding-top: 12px; margin-top: 8px; }
    .profile-stats .stat strong { display: block; color: var(--primary); }
    .profile-stats .stat span { font-size: .75rem; color: var(--muted); }

    .menu-item {
      display: flex; align-items: center; gap: 12px; padding: 10px 18px;
      font-size: .92rem; cursor: pointer; transition: background var(--transition);
      border-radius: 8px; margin: 4px 6px; color: var(--text);
    }
    .menu-item:hover, .menu-item.active { background: #222; color: var(--primary); }

    /* FEED */
    .feed { display: flex; flex-direction: column; gap: 16px; }

    .stories-bar { padding: 14px 16px; }
    .stories-bar h4 { font-size: .8rem; color: var(--primary); margin-bottom: 12px; text-transform: uppercase; }
    .stories-list { display: flex; gap: 12px; overflow-x: auto; }
    .story-item { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; }
    .story-ring { width: 58px; height: 58px; border-radius: 50%; padding: 2px; background: var(--primary); }
    .story-item span { font-size: .72rem; color: var(--muted); }

    .create-post { padding: 16px; }
    .create-post .top { display: flex; gap: 12px; margin-bottom: 12px; }
    .create-post textarea { flex: 1; border: 1px solid var(--border); border-radius: var(--radius); padding: 10px; min-height: 70px; background: #0f0f0f; }
    .create-post .actions { display: flex; justify-content: space-between; align-items: center; }
    .btn-media { padding: 7px 14px; border-radius: 20px; background: #222; color: var(--primary); border: 1px solid var(--border); font-size: .82rem; }
    .btn-post { padding: 8px 22px; background: var(--primary); color: #000; border-radius: 20px; font-weight: 700; }

    /* POSTS */
    .post-header { display: flex; align-items: center; gap: 10px; padding: 14px 16px 10px; }
    .post-header .meta { flex: 1; }
    .post-header .meta .uname { font-weight: 700; color: #fff; }
    .post-header .meta .time { font-size: .78rem; color: var(--muted); }
    .post-body { padding: 0 16px 12px; font-size: .93rem; line-height: 1.6; }
    
    /* NO IMAGE POST PLACEHOLDER */
    .post-visual-placeholder {
      height: 200px;
      background: repeating-linear-gradient(45deg, #1a1a1a, #1a1a1a 10px, #222 10px, #222 20px);
      display: flex; align-items: center; justify-content: center;
      border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
      color: var(--primary); font-size: 3rem; opacity: 0.5;
    }

    .post-actions { display: flex; gap: 4px; padding: 8px 12px; border-top: 1px solid var(--border); }
    .action-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 8px; background: none; color: var(--muted); font-weight: 600; font-size: .85rem; }
    .action-btn:hover { color: var(--primary); }
    .action-btn.liked { color: var(--primary); }

    /* WIDGETS */
    .widget { padding: 16px; }
    .widget h4 { font-size: .82rem; color: var(--primary); text-transform: uppercase; margin-bottom: 12px; }
    .suggestion-item { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .suggestion-item .sinfo { flex: 1; }
    .suggestion-item .sname { font-weight: 600; font-size: .88rem; color: #fff; }
    .suggestion-item .smutual { font-size: .75rem; color: var(--muted); }
    .btn-follow { padding: 5px 14px; border-radius: 20px; background: var(--primary); color: #000; font-size: .78rem; font-weight: 700; }

    .online-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .online-friend { position: relative; }
    .online-dot { position: absolute; bottom: 1px; right: 1px; width: 10px; height: 10px; background: var(--primary); border-radius: 50%; border: 2px solid #000; }

    /* TOAST */
    #toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
    .toast { background: var(--primary); color: #000; padding: 12px 18px; border-radius: var(--radius); font-weight: 600; box-shadow: 0 4px 20px rgba(0,0,0,.5); animation: slideIn .3s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }

    /* MODAL */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.9); z-index: 200; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal-box { background: var(--card); border-radius: 20px; width: 100%; max-width: 500px; border: 1px solid var(--border); text-align: center; overflow: hidden; }
    .modal-cover { height: 100px; background: linear-gradient(135deg, #000, var(--primary-d)); }
    .modal-info { padding: 0 24px 24px; margin-top: -40px; }
    .modal-info h2 { color: #fff; margin-top: 10px; }
    .modal-info .modal-handle { color: var(--primary); margin-bottom: 10px; }
    .modal-close { position: absolute; top: 20px; right: 20px; color: #fff; cursor: pointer; font-size: 1.5rem; }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="logo">&#127758; Flow</div>
    <p class="tagline">Golden Flow Edition — Sem distrações visuais</p>
    <div id="login-form">
      <input type="text" id="login-name" placeholder="Seu nome" maxlength="20" />
      <button class="btn-primary" onclick="doLogin()">Entrar no Luxo</button>
      <p class="switch-link">Acesso restrito à elite</p>
    </div>
  </div>
</div>

<div id="app" style="display:none">
  <nav class="navbar">
    <div class="brand">Flow</div>
    <div class="nav-icons">
      <div class="nav-icon-btn">&#128276;<span class="badge">2</span></div>
      <div id="nav-avatar-container"></div>
    </div>
  </nav>

  <div class="main-layout">
    <aside class="sidebar-left">
      <div class="profile-card">
        <div class="cover"></div>
        <div class="info">
          <div class="avatar-wrap" id="sidebar-avatar-container"></div>
          <div class="name" id="sidebar-name">Usuário</div>
          <div class="handle" id="sidebar-handle">@user</div>
          <div class="profile-stats">
            <div class="stat"><strong>12</strong><span>Posts</span></div>
            <div class="stat"><strong>850</strong><span>Fãs</span></div>
          </div>
        </div>
      </div>
      <div class="menu-card">
        <div class="menu-item active">&#127968; Início</div>
        <div class="menu-item">&#128100; Perfil</div>
        <div class="menu-item" onclick="location.reload()">&#128682; Sair</div>
      </div>
    </aside>

    <main class="feed">
      <div class="stories-bar">
        <h4>Flow Dourado</h4>
        <div class="stories-list" id="stories-list"></div>
      </div>

      <div class="create-post">
        <div class="top">
          <div id="create-avatar-container"></div>
          <textarea id="post-text" placeholder="Qual sua mensagem para a elite?"></textarea>
        </div>
        <div class="actions">
          <button class="btn-media" onclick="addEmoji()">✨ Emoji</button>
          <button class="btn-post" onclick="createPost()">Publicar</button>
        </div>
      </div>

      <div id="posts-container"></div>
    </main>

    <aside class="sidebar-right">
      <div class="widget">
        <h4>Recomendações</h4>
        <div id="suggestions-list"></div>
      </div>
      <div class="widget">
        <h4>Membros Online</h4>
        <div class="online-list" id="online-list"></div>
      </div>
    </aside>
  </div>
</div>

<div class="modal-overlay" id="profile-modal">
  <div class="modal-box">
    <div class="modal-cover"></div>
    <div class="modal-info">
      <div id="modal-avatar-container"></div>
      <h2 id="modal-name">Nome</h2>
      <p class="modal-handle" id="modal-handle">@handle</p>
      <button class="btn-primary" onclick="closeModal()">Fechar</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script>
  let currentUser = null;
  const USERS = [
    { name: 'Ana Silva', handle: 'anasilva', initial: 'A' },
    { name: 'Bruno Lux', handle: 'bruno', initial: 'B' },
    { name: 'Carla Ouro', handle: 'carla', initial: 'C' },
    { name: 'David Gold', handle: 'david', initial: 'D' }
  ];

  function createAvatarHTML(initial, sizeClass = 'avatar-sm') {
    return `<div class="avatar-placeholder ${sizeClass}">${initial}</div>`;
  }

  function doLogin() {
    const name = document.getElementById('login-name').value || 'Convidado';
    currentUser = { name, handle: name.toLowerCase().replace(/ /g, ''), initial: name[0] };
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    
    document.getElementById('nav-avatar-container').innerHTML = createAvatarHTML(currentUser.initial);
    document.getElementById('sidebar-avatar-container').innerHTML = createAvatarHTML(currentUser.initial, 'avatar-md');
    document.getElementById('create-avatar-container').innerHTML = createAvatarHTML(currentUser.initial);
    document.getElementById('sidebar-name').innerText = currentUser.name;
    document.getElementById('sidebar-handle').innerText = '@' + currentUser.handle;
    
    renderAll();
    showToast('✨ Bem-vindo ao Flow Dourado');
  }

  function renderAll() {
    renderStories();
    renderSuggestions();
    renderOnline();
    renderPosts();
  }

  function renderStories() {
    const list = document.getElementById('stories-list');
    list.innerHTML = USERS.map(u => `
      <div class="story-item">
        <div class="story-ring">${createAvatarHTML(u.initial, 'avatar-sm')}</div>
        <span>${u.name.split(' ')[0]}</span>
      </div>
    `).join('');
  }

  function renderSuggestions() {
    const list = document.getElementById('suggestions-list');
    list.innerHTML = USERS.map(u => `
      <div class="suggestion-item">
        ${createAvatarHTML(u.initial)}
        <div class="sinfo"><div class="sname">${u.name}</div><div class="smutual">Elite</div></div>
        <button class="btn-follow">Seguir</button>
      </div>
    `).join('');
  }

  function renderOnline() {
    const list = document.getElementById('online-list');
    list.innerHTML = USERS.map(u => `
      <div class="online-friend">
        ${createAvatarHTML(u.initial)}
        <span class="online-dot"></span>
      </div>
    `).join('');
  }

  function renderPosts() {
    const container = document.getElementById('posts-container');
    const samplePosts = [
      { name: 'Ana Silva', initial: 'A', text: 'O silêncio é de ouro, mas o estilo é para sempre. ✨', icon: '💎' },
      { name: 'Bruno Lux', initial: 'B', text: 'Apenas o essencial importa nesta rede social minimalista.', icon: '🦁' }
    ];
    container.innerHTML = samplePosts.map(p => `
      <div class="post-card">
        <div class="post-header">
          ${createAvatarHTML(p.initial)}
          <div class="meta"><div class="uname">${p.name}</div><div class="time">2h atrás</div></div>
        </div>
        <div class="post-body">${p.text}</div>
        <div class="post-visual-placeholder">${p.icon}</div>
        <div class="post-actions">
          <button class="action-btn">❤️ Curtir</button>
          <button class="action-btn">💬 Comentar</button>
        </div>
      </div>
    `).join('');
  }

  function createPost() {
    const txt = document.getElementById('post-text').value;
    if(!txt) return;
    const container = document.getElementById('posts-container');
    const newPost = `
      <div class="post-card">
        <div class="post-header">
          ${createAvatarHTML(currentUser.initial)}
          <div class="meta"><div class="uname">${currentUser.name}</div><div class="time">Agora</div></div>
        </div>
        <div class="post-body">${txt}</div>
        <div class="post-visual-placeholder">✨</div>
        <div class="post-actions"><button class="action-btn">❤️ Curtir</button></div>
      </div>
    `;
    container.insertAdjacentHTML('afterbegin', newPost);
    document.getElementById('post-text').value = '';
    showToast('✅ Mensagem enviada');
  }

  function addEmoji() { document.getElementById('post-text').value += '✨'; }

  function showToast(msg) {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerText = msg;
    container.appendChild(toast);
    setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 400); }, 3000);
  }

  function closeModal() { document.getElementById('profile-modal').style.display = 'none'; }
</script>
</body>
</html>
